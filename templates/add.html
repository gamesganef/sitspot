<!DOCTYPE html>
<html>
<head>
    <title>Nieuwe Spot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5850476951105682"
     crossorigin="anonymous"></script>
     <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5850476951105682"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="mobile">

<header class="top-header">
    <a href="/" class="back-btn">← Terug</a>
    <h2>Nieuwe spot</h2>
</header>

<form method="post" enctype="multipart/form-data" class="form">

    <!-- 📍 LOCATIE BUTTON -->
    <div class="card">
        <button type="button" class="big-btn" onclick="getLocation()">
            📍 Gebruik mijn locatie
        </button>
    </div>

    <!-- 📍 BASIS INFO -->
    <div class="card">
        <label>Naam van de plek</label>
        <input name="name" placeholder="Bijv. Bankje bij meer">

        <label>Stad / locatie</label>
        <input name="location" placeholder="Bijv. Rotterdam">
    </div>

    <!-- 📝 BESCHRIJVING -->
    <div class="card">
        <label>Beschrijving</label>
        <textarea name="description" placeholder="Vertel iets over deze plek..."></textarea>
    </div>

    <!-- 🌍 COORDINATEN -->
    <div class="card">
        <label>Latitude</label>
        <input id="lat" name="lat" placeholder="Bijv. 51.9225">

        <label>Longitude</label>
        <input id="lng" name="lng" placeholder="Bijv. 4.47917">
    </div>

    <!-- 📸 FOTO -->
    <div class="card">
        <label>Upload foto's</label>
        <input type="file" name="images" multiple>
    </div>

    <!-- ✅ SUBMIT -->
    <button class="big-btn submit-btn">➕ Spot opslaan</button>

</form>

<!-- 🔥 BOTTOM NAV -->
<div class="bottom-nav">
    <a href="/">🏠</a>
    <a href="/favorites">❤️</a>
    <a href="/add" class="add-btn">＋</a>
    <a href="/logout">👤</a>
</div>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById("lat").value = position.coords.latitude;
            document.getElementById("lng").value = position.coords.longitude;
        }, function() {
            alert("Locatie ophalen mislukt");
        });
    } else {
        alert("GPS niet ondersteund");
    }
}
</script>

</body>
</html>
