<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SitSpot</title>

    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>

    <div style="display:flex; align-items:center; gap:10px;">
        <h1>📍 SitSpot</h1>
    </div>

    <!-- 🔥 ZOEK -->
    <form onsubmit="searchCity(event)" style="display:flex; gap:5px;">
        <input id="searchInput" placeholder="🔍 Zoek op stad">
        <button class="btn">Zoeken</button>
    </form>

    <div style="display:flex; gap:5px; flex-wrap:wrap;">
        <button class="btn" onclick="getLocation()">📍 Near me</button>

        {% if user %}
            <span>👤 {{user}}</span>
            <a href="/logout" class="btn">🚪 Logout</a>
            <a href="/add" class="btn">➕ Spot</a>
        {% else %}
            <a href="/login" class="btn">🔐 Login</a>
            <a href="/register" class="btn">📝 Register</a>
        {% endif %}
    </div>

</header>

<!-- 🔥 BACKUP KNOPPEN (NU VOOR IEDEREEN) -->
<div style="padding:10px; display:flex; gap:10px; flex-wrap:wrap;">

    <a href="/backup" class="btn">⬇️ Download DB</a>

    <form action="/restore" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button class="btn">⬆️ Upload DB</button>
    </form>

</div>

<div id="map"></div>

<div class="grid">
{% for s in spots %}
    <a href="/spot/{{s[0]}}" class="card">
        <h2>{{s[1]}}</h2>
        <p>📍 {{s[2]}}</p>
    </a>
{% endfor %}
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var markers = [];

{% for s in spots %}
    var lat = parseFloat("{{s[4]}}");
    var lng = parseFloat("{{s[5]}}");

    if (!isNaN(lat) && !isNaN(lng)) {
        var marker = L.marker([lat, lng])
            .addTo(map)
            .bindPopup("{{s[1]}}");

        markers.push(marker);
    }
{% endfor %}

if (markers.length > 0) {
    var group = L.featureGroup(markers);
    map.fitBounds(group.getBounds());
} else {
    map.setView([52.37, 4.89], 10);
}

function searchCity(e){
    e.preventDefault();

    let city = document.getElementById("searchInput").value;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`)
    .then(res => res.json())
    .then(data => {

        if(data.length > 0){
            let lat = parseFloat(data[0].lat);
            let lon = parseFloat(data[0].lon);

            map.setView([lat, lon], 13);

            markers.forEach(m => {
                let pos = m.getLatLng();

                let distance = map.distance(
                    [lat, lon],
                    [pos.lat, pos.lng]
                );

                if(distance < 10000){
                    if(!map.hasLayer(m)) m.addTo(map);
                } else {
                    map.removeLayer(m);
                }
            });

        } else {
            alert("Stad niet gevonden");
        }
    });
}
</script>

<script>
function getLocation(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(pos){
            alert("Lat: " + pos.coords.latitude + " Lng: " + pos.coords.longitude);
        });
    }
}
</script>

</body>
</html>
