<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Registreren - SitSpot</title>

    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/css/style.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- HEADER -->
<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <button onclick="history.back()" class="back-btn">←</button>
        <h2>📝 Account maken</h2>
    </div>
</header>

<!-- FORM -->
<form method="post" class="form">

    <label>👤 Username</label>
    <input type="text" name="username" placeholder="Kies een username" required>

    <label>🔑 Password</label>
    <input type="password" name="password" placeholder="Kies een wachtwoord" required>

    <button class="btn">Registreren</button>

</form>

<!-- LINK -->
<p style="text-align:center;">
    Al een account?
    <a href="/login">Login</a>
</p>

</body>
</html>
