<!DOCTYPE html>
<html>
<head>
    <title>Register - SitSpot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5850476951105682"
     crossorigin="anonymous"></script>
     <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5850476951105682"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 340px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .info {
            font-size: 13px;
            color: #666;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #45a049;
        }

        a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .link {
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

<a href="/" class="back">← Terug</a>

<div class="container">
    <h2>Account maken</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Wachtwoord" required>

        <div class="info">
            Minimaal 8 tekens,<br>
            1 hoofdletter en 1 speciaal teken
        </div>

        <button type="submit">Register</button>
    </form>

    <a href="/login" class="link">Heb je al een account? Login</a>
</div>

</body>
</html>
