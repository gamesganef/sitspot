<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{s[1]}} - SitSpot</title>

    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- HEADER -->
<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <button onclick="history.back()" class="back-btn">←</button>
        <h1>{{s[1]}}</h1>
    </div>
</header>

<!-- FOTO SLIDER -->
<div class="slider">
{% for i in imgs %}
    <img src="/static/uploads/{{i[0]}}">
{% endfor %}
</div>

<!-- INFO -->
<div style="padding:15px;">
    <p>{{s[3]}}</p>
    <p>⭐ {{avg if avg else 0}}</p>
</div>

<!-- REVIEW FORM -->
<div style="padding:15px;">
    <h3>⭐ Plaats een review</h3>

    <form method="post" action="/rate/{{s[0]}}">
        <label>Rating (1-5)</label>
        <input type="number" name="rating" min="1" max="5" required>

        <label>Comment</label>
        <input name="comment" placeholder="Wat vond je van deze plek?" required>

        <button class="btn">Review plaatsen</button>
    </form>
</div>

<!-- REVIEWS -->
<div style="padding:15px;">
    <h3>Reviews</h3>

    {% for r in reviews %}
        <div class="card">
            <p><b>{{r[0]}}</b> ⭐ {{r[1]}}</p>
            <p>{{r[2]}}</p>
        </div>
    {% endfor %}
</div>

<!-- COMMENTS -->
<div style="padding:15px;">
    <h3>Comments</h3>

    <form method="post" action="/comment/{{s[0]}}">
        <input name="text" placeholder="Typ een comment..." required>
        <button class="btn">Plaatsen</button>
    </form>

    {% for c in comments %}
        <p><b>{{c[0]}}</b>: {{c[1]}}</p>
    {% endfor %}
</div>

<!-- MAP -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([{{s[4]}}, {{s[5]}}], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

L.marker([{{s[4]}}, {{s[5]}}]).addTo(map);
</script>

</body>
</html>
