<!DOCTYPE html>
<html>
<head>
    <title>Login - SitSpot</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #45a049;
        }

        a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .link {
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

<a href="/" class="back">← Terug</a>

<div class="container">
    <h2>Login</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Wachtwoord" required>
        <button type="submit">Login</button>
    </form>

    <a href="/register" class="link">Nog geen account? Maak er één</a>
</div>

</body>
</html>
